    const htmlFilesWithBase = htmlFiles.map(file => basePath + file);

    // --- Sort all files alphabetically by filename ---
    htmlFilesWithBase.sort((a, b) => {
      const nameA = a.split("/").pop().toLowerCase();
      const nameB = b.split("/").pop().toLowerCase();
      return nameA.localeCompare(nameB);
    });

    const searchInput = document.getElementById('search');
    const groupToggle = document.getElementById('groupToggle');
    const listElement = document.getElementById('page-list');
    const paginationElement = document.getElementById('pagination');

    const itemsPerPage = 20;
    let currentPage = 1;
    let currentFiles = [...htmlFilesWithBase];

    function getDisplayName(filename) {
      return filename
        .replace('.html', '')
        .split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function groupFiles(files) {
      const grouped = {};

      files.forEach(file => {
        const parts = file.replace(basePath, '').split('/');
        const folder = parts[1];
        if (!grouped[folder]) grouped[folder] = [];
        grouped[folder].push(file);
      });

      // --- Sort files inside each group alphabetically ---
      Object.keys(grouped).forEach(folder => {
        grouped[folder].sort((a, b) => {
          const nameA = a.split('/').pop().toLowerCase();
          const nameB = b.split('/').pop().toLowerCase();
          return nameA.localeCompare(nameB);
        });
      });

      return grouped;
    }

    function displayList(files, grouped, page = 1) {
      listElement.innerHTML = '';

      const pageFiles = grouped
        ? files // Show all files when grouped
        : files.slice((page - 1) * itemsPerPage, page * itemsPerPage);

      if (grouped) {
        const groupedFiles = groupFiles(pageFiles);

        // --- Sort categories alphabetically ---
        Object.keys(groupedFiles)
          .sort((a, b) => a.localeCompare(b))
          .forEach(folder => {
            const fileList = groupedFiles[folder];

            const section = document.createElement('section');
            section.className = 'group';

            const heading = document.createElement('h2');
            heading.textContent = folder
              .replace(/-/g, ' ')
              .replace(/\b\w/g, c => c.toUpperCase());
            heading.addEventListener('click', () => {
              section.classList.toggle('collapsed');
            });

            section.appendChild(heading);

            const ul = document.createElement('ul');

            fileList.forEach(file => {
              const li = document.createElement('li');
              const link = document.createElement('a');
              link.href = file;
              link.textContent = getDisplayName(file.split('/').pop());
              li.appendChild(link);
              ul.appendChild(li);
            });

            section.appendChild(ul);

            const wrapperLi = document.createElement('li');
            wrapperLi.appendChild(section);
            listElement.appendChild(wrapperLi);
          });

        paginationElement.style.display = 'none';
      } else {
        pageFiles.forEach(file => {
          const li = document.createElement('li');
          const link = document.createElement('a');
          link.href = file;
          link.textContent = getDisplayName(file.split('/').pop());
          li.appendChild(link);
          listElement.appendChild(li);
        });

        paginationElement.style.display = '';
        renderPagination(files);
      }

      if (files.length === 0) {
        listElement.innerHTML = '<li>No results found.</li>';
        paginationElement.style.display = 'none';
      }
    }

    function renderPagination(files) {
      paginationElement.innerHTML = '';
      const pageCount = Math.ceil(files.length / itemsPerPage);

      for (let i = 1; i <= pageCount; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.classList.add('active');
        btn.addEventListener('click', () => {
          currentPage = i;
          displayList(currentFiles, false, currentPage);
        });
        paginationElement.appendChild(btn);
      }
    }

    function filterFiles() {
      const query = searchInput.value.trim().toLowerCase();
      const keywords = query.split(/\s+/).filter(Boolean);
      const regex = new RegExp(keywords.map(k => `(?=.*${k})`).join(''), 'i');

      currentFiles = htmlFilesWithBase.filter(file => {
        const fileName = file.split('/').pop().replace('.html', '').toLowerCase();
        return regex.test(fileName);
      });

      currentPage = 1;
      displayList(currentFiles, groupToggle.checked, currentPage);
    }

    searchInput.addEventListener('input', filterFiles);
    groupToggle.addEventListener('change', () => {
      currentPage = 1;
      displayList(currentFiles, groupToggle.checked, currentPage);
    });

    displayList(currentFiles, groupToggle.checked, currentPage);
  </script>
